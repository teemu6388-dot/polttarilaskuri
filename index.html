<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reissubudjetti PWA</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22Reissubudjetti%22,%22short_name%22:%22Budjetti%22,%22start_url%22:%22index.html%22,%22display%22:%22standalone%22,%22background_color%22:%22#121212%22,%22theme_color%22:%22#1e1e1e%22}">
</head>
<body>

<div class="container">
    <header>
        <h1>Reissubudjetti PWA</h1>
        <button class="toggle-btn" id="themeToggle">Tumma teema</button>
    </header>

    <section class="card">
        <h2>👥 Osallistujat</h2>
        <div class="flex-group">
            <input type="text" id="newParticipantName" placeholder="Osallistujan nimi">
            <button id="addParticipantBtn">Lisää</button>
        </div>
        <div id="participantsList"></div>
    </section>

    <section class="card">
        <h2>🎉 Aktiviteetit</h2>
        <div class="flex-group">
            <input type="text" id="activityName" placeholder="Aktiviteetin nimi">
            <input type="number" id="activityCost" placeholder="Kokonaiskustannus (€)" step="0.01">
            <button id="addActivityBtn">Lisää</button>
        </div>
        <div id="activitiesList"></div>
        <h3 id="totalActivitiesCost">Aktiviteetit yhteensä: 0 €</h3>
    </section>

    <section class="card">
        <h2>🚗 Autot & Polttoaine</h2>
        <div class="flex-group">
            <div>
                <label for="carDistance">Matka (km)</label>
                <input type="number" id="carDistance" value="100">
            </div>
            <div>
                <label for="carConsumption">Keskikulutus (l/100km)</label>
                <input type="number" id="carConsumption" value="6.5" step="0.1">
            </div>
        </div>
        <div class="flex-group">
            <div>
                <label for="carFuelPrice">Polttoaineen hinta (€/l)</label>
                <input type="number" id="carFuelPrice" value="1.95" step="0.01">
            </div>
            <div>
                <label for="carPayers">Maksajien määrä</label>
                <input type="number" id="carPayers" value="1" min="1">
            </div>
        </div>
        <div id="carResult">
            <p><strong>Polttoainekulut yhteensä:</strong> <span id="carTotalCost">0.00</span> €</p>
            <p><strong>Kustannus / maksaja:</strong> <span id="carCostPerPayer">0.00</span> €</p>
        </div>
    </section>

    <section class="card">
        <h2>📝 Muistiinpanot</h2>
        <textarea id="notesArea" rows="6" placeholder="Kirjoita muistiinpanoja tähän..."></textarea>
    </section>
</div>

<script src="app.js"></script>
</body>
</html>
